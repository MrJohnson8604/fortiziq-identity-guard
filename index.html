    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {"@type":"Question","name":"What is identity theft protection and why do I need it?","acceptedAnswer":{"@type":"Answer","text":"Identity theft protection is a continuous monitoring service that watches your personal data — Social Security Number, credit profile, bank accounts, and digital identity — across credit bureaus and the dark web. With over 1 million identity theft cases reported every year, proactive monitoring is the difference between catching fraud in hours versus discovering it months later when the damage is already done."}},
        {"@type":"Question","name":"What's the difference between Gold and Platinum?","acceptedAnswer":{"@type":"Answer","text":"Gold ($21.99/mo) includes 1-bureau credit monitoring, the full Identity Bundle, $1M insurance, and US-based resolution. Platinum ($28.99/mo) upgrades you to 3-bureau credit monitoring and reporting across Experian, Equifax, and TransUnion."}},
        {"@type":"Question","name":"What is the one-time Credit Report option?","acceptedAnswer":{"@type":"Answer","text":"The Credit Report purchase gives you your full credit report and your credit score from all three credit bureaus — Experian, Equifax, and TransUnion — in a single one-time purchase. There is no subscription and no recurring charge."}},
        {"@type":"Question","name":"Why does my score matter — isn't the report enough?","acceptedAnswer":{"@type":"Answer","text":"Your credit report and your credit score are two separate things. Your report shows your full history. Your score is the number lenders actually use when deciding whether to approve you and what interest rate to charge you."}},
        {"@type":"Question","name":"What exactly am I paying for monthly?","acceptedAnswer":{"@type":"Answer","text":"Your monthly subscription covers 24/7 monitoring across the dark web, credit bureaus, and your identity bundle, plus instant alerts. Both plans include the credit score simulator, US-based resolution specialists, and up to $1M in identity theft insurance underwritten by AIG."}},
        {"@type":"Question","name":"What do I do if I think my identity is already stolen?","acceptedAnswer":{"@type":"Answer","text":"Subscribe to either Gold or Platinum and contact our US-based resolution specialists immediately. They will take over the entire process: contacting creditors, freezing accounts, filing disputes, working with law enforcement, and restoring your identity end-to-end."}},
        {"@type":"Question","name":"Is my personal information secure with FortizIQ?","acceptedAnswer":{"@type":"Answer","text":"FortizIQ is SOC 2 compliant and uses bank-grade AES-256 encryption for all data in transit and at rest. Your information is never sold, shared, or used for marketing."}},
        {"@type":"Question","name":"Can I cancel anytime?","acceptedAnswer":{"@type":"Answer","text":"Yes. There are no contracts, no cancellation fees, and no hidden charges. You can cancel your subscription at any time directly from your account dashboard."}}
      ]
    }
